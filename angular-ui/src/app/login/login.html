<div class="container">
  <div class="row">
    <div class="col-3"></div>
    <div class="col-6 text-center">
      <img src="../../../public/images/logo-name.png" class="text-center" width="200" height="200">
    </div>
    <div class="col-3 my-auto">
      <button type="button" class="btn w-75 accent primary-text btn-hover" (click)="register()">Register</button>
    </div>
  </div>
  <div class="card inner-container">
    <div class="card-header text-center primary-text">
      <h1>Login</h1>
    </div>
    <div class="card-body">
      <div *ngIf="errorMessage" class="alert alert-danger text-center">
        {{ errorMessage }}
      </div>
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="input-group mb-3">
          <input type="text" class="form-control primary-text" id="username" formControlName="username" placeholder="Enter your username">
        </div>
        <div class="input-group mb-3">
          <input type="password" class="form-control primary-text" id="password" formControlName="password" placeholder="Enter your password">
        </div>
        <div class="text-center">
          <button type="submit" class="btn w-75 accent primary-text btn-hover" [disabled]="loginForm.invalid">Login</button>
        </div>
      </form>
    </div>
  </div>
</div>
