<div class="container">
  <div class="card inner-container mt-3">
    <div class="card-header primary-text text-center">
      <h3>User Profile</h3>
      <button (click)="onUserEdit()" class="btn accent primary-text btn-hover">Edit</button>
    </div>
    <div class="card-body">
      <form [formGroup]="userForm">
        <div class="row">
            <div class="col-6 mb-3">
                <label for="firstName" class="form-label primary-text">First Name</label>
                <input type="text" class="form-control primary-text" id="firstName" formControlName="firstName">
            </div>
            <div class="col-6 mb-3">
                <label for="lastName" class="form-label primary-text">Last Name</label>
                <input type="text" class="form-control primary-text" id="lastName" formControlName="lastName">
            </div>
        </div>
        <div class="row">
            <div class="col-6 mb-3">
                <label for="username" class="form-label primary-text">Username</label>
                <input type="text" class="form-control primary-text" id="username" formControlName="username">
            </div>
        </div>
        <div class="row">
          <div class="col-12 mb-3">
            <label for="email" class="form-label primary-text">Email</label>
            <input type="email" class="form-control primary-text" id="email" formControlName="email">
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="card inner-container mt-3">
    <div class="card-header primary-text text-center">
      <h3>Child Information</h3>
      <button (click)="onChildEdit()" class="btn accent primary-text btn-hover">Edit</button>
    </div>
    <div class="card-body">
      <form [formGroup]="childForm">
        <div class="row">
            <div class="col-6 mb-3">
                <label for="firstName" class="form-label primary-text">First Name</label>
                <input type="text" class="form-control primary-text" id="firstName" formControlName="firstName">
            </div>
            <div class="col-6 mb-3">
                <label for="lastName" class="form-label primary-text">Last Name</label>
                <input type="text" class="form-control primary-text" id="lastName" formControlName="lastName">
            </div>
        </div>
        <div class="row">
            <div class="col-6 mb-3">
                <label for="gender" class="form-label primary-text">Gender</label>
                <select class="form-select primary-text" id="gender" formControlName="gender" required aria-label="Gender">
                    <option value="0" selected>Male</option>
                    <option value="1">Female</option>
                    <option value="2">Other</option>
                </select>
            </div>
            <div class="col-6 mb-3">
                <label for="dob" class="form-label primary-text">Birth Date</label>
                <input type="date" class="form-control primary-text" id="dob" formControlName="dob">
            </div>
        </div>
      </form>
    </div>
  </div>
  <div class="text-center mt-3">
    <button (click)="onSave()" class="btn accent primary-text btn-hover" [disabled]="childForm.disabled && userForm.disabled">Save</button>
  </div>
  <div class="card inner-container mt-3">
    <div class="card-header primary-text text-center">
      <h3>Change Password</h3>
      <button (click)="onPasswordEdit()" class="btn accent primary-text btn-hover">Edit</button>
    </div>
    <div class="card-body">
      <form [formGroup]="passwordForm" (ngSubmit)="onPasswordSave()">
        <div class="row">
            <div class="col-6 mb-3">
                <label for="password" class="form-label primary-text">Password</label>
                <input type="password" class="form-control primary-text" id="password" formControlName="password">
            </div>
            <div class="col-6 mb-3">
                <label for="confirmPassword" class="form-label primary-text">Confirm Password</label>
                <input type="password" class="form-control primary-text" id="confirmPassword" formControlName="confirmPassword">
            </div>
        </div>
        <div class="row text-center mt-3">
            <button type="submit" class="btn accent primary-text btn-hover w-50 mx-auto" [disabled]="passwordForm.invalid || passwordForm.disabled">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
